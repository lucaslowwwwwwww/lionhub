<!doctype html>
<html lang="en" class="dark">

<head>
  <script>
    (function() {
      try {
        const theme = localStorage.getItem('ldms-theme');
        const root = document.documentElement;
        if (theme === 'light') {
          root.classList.remove('dark');
          root.classList.add('light');
        } else {
          root.classList.add('dark');
          root.classList.remove('light');
        }
      } catch (e) {}
    })();
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/lionhub_logo.png?v=2" />
  <link rel="icon" type="image/jpeg" href="/lionhub_logo.jpeg?v=2" />
  <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Lionhub — Professional performance and association management platform." />
  <meta name="theme-color" content="#e11d48" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Lionhub" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="apple-touch-icon" href="/lionhub_logo.png?v=2">

</head>

</body>

</html>
